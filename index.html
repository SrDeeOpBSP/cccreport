<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Operation Management</title>
    <style>
        /* Modern Reset and Font Settings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f4f6f9 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Container Card */
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 6px solid #1e3c72;
        }

        /* Header Styling */
        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 35px;
            position: relative;
            text-transform: uppercase;
        }

        /* Header ke niche choti decorative line */
        h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: #f39c12;
            margin: 10px auto 0 auto;
            border-radius: 2px;
        }

        /* Grid Layout for Buttons */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Modern & Attractive Button Styling */
        .btn-module {
            background: #ffffff;
            color: #2c3e50;
            border: 1px solid #dcdde1;
            padding: 18px 24px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        /* Left side thick border color effect */
        .btn-module::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: #1e3c72;
            transition: width 0.2s ease;
        }

        /* Hover Effects */
        .btn-module:hover {
            color: #ffffff;
            background: #1e3c72;
            border-color: #1e3c72;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.2);
        }

        .btn-module:hover::before {
            width: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        /* Active click effect */
        .btn-module:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(30, 60, 114, 0.1);
        }

        /* Responsive adjustments for mobile screens */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 22px;
            }
            .btn-module {
                padding: 15px 20px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LOBBY OPERATIONS MANAGEMENT</h1>
        
        <div class="grid-layout">
            <button class="btn-module" onclick="location.href='ccform.html'"> Lobby Daily Operations & Crew Position (08:00 Hrs Reporting) <span>➔</span></button>
            <button class="btn-module" onclick="location.href='ccdashboard.html'">Lobby Operation Dashboard <span>➔</span></button>
    </div>

</body>
</html>
